version: "3.8"

services:
  app:
    build:
      context: ./docker/php
    container_name: laravel_app
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=alcotracker
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: alcotracker
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "8081:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      # Для production используйте Dockerfile и добавьте:
      # dockerfile: Dockerfile
      # args:
      #   - API_BASE_URL=http://nginx_server:80
    platform: linux/amd64
    container_name: nuxt_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
      - NUXT_PUBLIC_API_BASE=http://localhost:8081
      - NUXT_PUBLIC_API_URL=http://localhost:8081/api
      - CHOKIDAR_USEPOLLING=1
      - WATCHPACK_POLLING=true
      # Для production добавьте:
      # - API_BASE_URL=http://nginx_server:80

volumes:
  db_data:
  frontend_node_modules:
