# Production: 2 vCPU / 2 GB RAM / 40 GB NVMe
# Запуск: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  app:
    build:
      context: ./docker/php
    container_name: laravel_app
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-alcotracker}
      - DB_USERNAME=${DB_USERNAME:-laravel}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m

  db:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-alcotracker}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    mem_limit: 512m

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    mem_limit: 64m

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: https://${API_DOMAIN}
    container_name: nuxt_frontend
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=384
      - API_BASE_URL=https://${API_DOMAIN}
    restart: unless-stopped
    mem_limit: 512m

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - FRONTEND_DOMAIN=${FRONTEND_DOMAIN}
      - API_DOMAIN=${API_DOMAIN}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nginx
      - frontend
    restart: unless-stopped
    mem_limit: 64m

volumes:
  db_data:
  caddy_data:
  caddy_config:
